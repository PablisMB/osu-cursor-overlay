name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore

    - name: Submit to SignPath
      shell: pwsh
      run: |
        Install-Module -Name SignPath -Force
        Submit-SigningRequest `
          -InputArtifactPath "bin/Release/net8.0-windows/OsuCursorOverlay.exe" `
          -ApiToken "${{ secrets.SIGNPATH_API_TOKEN }}" `
          -OrganizationId "40cf082b-addb-4383-b3b5-1e905c07a4a9" `
          -ProjectSlug "Osu_Cursor_Overlay" `
          -SigningPolicySlug "Default" `
          -OutputArtifactPath "bin/Release/net8.0-windows/OsuCursorOverlay.exe" `
          -WaitForCompletion `
          -Force

    - name: Upload signed executable
      uses: actions/upload-artifact@v4
      with:
        name: signed-exe
        path: bin/Release/net8.0-windows/OsuCursorOverlay.exe

